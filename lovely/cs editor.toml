[manifest]
version = "1.1.1"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "states/Menu.lua"
pattern = '''
st:setFgDraw(function(self)
'''
position = "after"
payload = '''
--[[
	self.wow = imgui.Begin("CS Editor", nil, 0)
		imguiextra.drawTable(cs)
	imgui.End()]]
'''
match_indent = true