[manifest]
version = "1.1.1"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "states/Menu.lua"
pattern = '''
st:setFgDraw(function(self)
'''
position = "after"
payload = '''
if maininput:down("f9") then
	self.editMenu = true
end

if self.chimaera then
	self.menuMusicManager:stop()
	
	--[[cs = bs.load('BattleState')
	cs.bg = self.bg
	cs:init({{'chimaeraBoss', { ogx = 467, ogy = 153 }}}, {"The walls shift...",
		"A gust of wind rattles the room.",
		"Distant echoes.",
		"The ground trembles slightly.",
		"Shadows dance across the walls.",
		"Time seems to slow down.",
		"A faint rumble echoes around.",
		"The air feels heavy.",
		"Silence fills the space.",
		"A eerie calm settles.",
		"Cranky wants cornbread",
		"..."})]]
		
	cs = bs.load('WorldState')
	self.bg.delete = true
	cs:init('Mods/ExtraStuff/rooms/EraChimaeraRoom.json')
end

local function shuffle(t)
	for i = #t, 2, -1 do
		local j = love.math.random(i)
		t[i], t[j] = t[j], t[i]
	end
end

if self.editMenu then
	self.editMenu = imgui.Begin("Edit Menu", true)
	
	if not self.oldMenu then
		imguiextra.DrawReorderableRadialList(self.mainMenu, "mainMenu", {imgui.GetContentRegionAvail().x, 24})

		if imgui.Button("Reset") then
			self.mainMenu:restoreHidden(extraDefaultSave.disabledMainOptions)
			extrasavedata.disabledMainOptions = helpers.copy(extraDefaultSave.disabledMainOptions)
			self.mainMenu:reorderToIds(extraDefaultSave.mainMenuList)
		end

		imgui.SameLine()

		if imgui.Button("Randomize") then
			shuffle(extrasavedata.mainMenuList)
			self.mainMenu:reorderToIds(extrasavedata.mainMenuList)
		end

		self.mainMenu:saveList(self.mainMenu, "mainMenuList", "disabledMainOptions")
	else
		dpf.saveJson("savedata/extraMod.sav", extrasavedata)
	end
	imguiextra.LabeledSeparator("Customization", 1)
	if not extrasavedata.moreMMenuCustomization then
		extrasavedata.moreMMenuCustomization = helpers.copytable(extraDefaultSave.moreMMenuCustomization)
	end
	extrasavedata.oldMenu = helpers.InputBool("Demo Menu Style (No Reordering (ME LAZY))", extrasavedata.oldMenu or false)
	if extrasavedata.moreMMenuCustomization then
		extrasavedata.moreMMenuCustomization.enabled = helpers.InputBool("More Customization", (extrasavedata.moreMMenuCustomization.enabled or false))
		if extrasavedata.moreMMenuCustomization.enabled then
			imguiextra.LabeledSeparator("Logo", 1)
			local logos = {"Beatblock", "BtRaNaToWnFnaSoCSWtItbE", "BeatblockShort", "PentasBeattools",} --"BeatABlock"}
			if not extrasavedata.moreMMenuCustomization.logo then extrasavedata.moreMMenuCustomization.logo = "Beatblock" end
			if imgui.BeginCombo("##LogoCombo", extrasavedata.moreMMenuCustomization.logo) then
				for i, v in ipairs(logos) do
					local isSelected = (v == extrasavedata.moreMMenuCustomization.logo)
					if imgui.Selectable_Bool(v, isSelected) then
						extrasavedata.moreMMenuCustomization.logo = v
						if sprites.title[extrasavedata.moreMMenuCustomization.logo] then
							local i = sprites.title[extrasavedata.moreMMenuCustomization.logo]
							if extrasavedata.moreMMenuCustomization.coloredLogo and sprites.title[extrasavedata.moreMMenuCustomization.logo .. "_colored"] then
								i = sprites.title[extrasavedata.moreMMenuCustomization.logo .. "_colored"]
							end
							sprites.title.logo = i
						else
							extrasavedata.moreMMenuCustomization.logo = "Beatblock"
						end
					end
				end
				imgui.EndCombo()
			end
			extrasavedata.moreMMenuCustomization.coloredLogo = helpers.InputBool("Colored Logo (Shuv still applies)", extrasavedata.moreMMenuCustomization.coloredLogo or false)
			if not extrasavedata.moreMMenuCustomization.logoPosOff then
				extrasavedata.moreMMenuCustomization.logoPosOff = {0,0}
			end
			extrasavedata.moreMMenuCustomization.logoPosOff[1] = helpers.InputFloat("X Offset", extrasavedata.moreMMenuCustomization.logoPosOff[1] or 0)
			extrasavedata.moreMMenuCustomization.logoPosOff[2] = helpers.InputFloat("Y Offset", extrasavedata.moreMMenuCustomization.logoPosOff[2] or 0)
			
			if not self.oldMenu then
				imguiextra.LabeledSeparator("RadialList Params", 1)
				extrasavedata.moreMMenuCustomization.radialList.circleWidth = helpers.InputFloat("circleWidth", extrasavedata.moreMMenuCustomization.radialList.circleWidth or 72)
				extrasavedata.moreMMenuCustomization.radialList.angleOffset = math.rad(helpers.InputFloat("angleOffset", math.deg(extrasavedata.moreMMenuCustomization.radialList.angleOffset) or 0))
				extrasavedata.moreMMenuCustomization.radialList.activeArc = helpers.InputFloat("activeArc", extrasavedata.moreMMenuCustomization.radialList.activeArc or 1.57)
				extrasavedata.moreMMenuCustomization.radialList.radius = helpers.InputFloat("radius", extrasavedata.moreMMenuCustomization.radialList.radius or 500)
				extrasavedata.moreMMenuCustomization.radialList.iconDistance = helpers.InputFloat("iconDistance", extrasavedata.moreMMenuCustomization.radialList.iconDistance or 0.261)
				extrasavedata.moreMMenuCustomization.radialList.x = helpers.InputFloat("x", extrasavedata.moreMMenuCustomization.radialList.x or 200)
				extrasavedata.moreMMenuCustomization.radialList.y = helpers.InputFloat("y", extrasavedata.moreMMenuCustomization.radialList.y or 750)
				extrasavedata.moreMMenuCustomization.radialList.static = helpers.InputBool("static", extrasavedata.moreMMenuCustomization.radialList.static or false)
				extrasavedata.moreMMenuCustomization.radialList.hideLabels = helpers.InputBool("hideLabels", extrasavedata.moreMMenuCustomization.radialList.hideLabels or false)
				if imgui.Button("Reset Params") then --helpers.InputFloat(k, v)
					extrasavedata.moreMMenuCustomization.radialList = helpers.copy(extraDefaultSave.moreMMenuCustomization.radialList)
				end
			end
			
			--local backgroundEntities = {"MenuBackground", "oldTitle", "CreditsBG", "cbackground", "TutorialBG", "ShinamonBG", "Rain", "HoleBackground", "TrumpetGirl", "Plasma", "SineWaves", "LawrenceBG", "DamoclismBG", "SpiralBG", "DecoAtomMap", "MonitorTheme"}
			local backgroundEntities = {"MenuBackground", "NoBG", "oldTitle", "CreditsBG", "cbackground", "TutorialBG", "ShinamonBG", "Rain", "HoleBackground", "PublicoBG", "Plasma", "SineWaves", "LawrenceBG", "DamoclismBG", "SpiralBG", "Player"}
			
			imguiextra.LabeledSeparator("Background Entity", 1)
			if imgui.BeginCombo("##BackgroundEntity", extrasavedata.moreMMenuCustomization.backgroundEntity) then
				for i, v in ipairs(backgroundEntities) do
					local isSelected = (v == extrasavedata.moreMMenuCustomization.backgroundEntity)
					if imgui.Selectable_Bool(v, isSelected) then
						extrasavedata.moreMMenuCustomization.backgroundEntity = v
						local param = em.init(v)
						self.bgparams = helpers.copytable(param)
						param.delete = true
					end
				end
				imgui.EndCombo()
			end
			if imgui.CollapsingHeader_TreeNodeFlags("Parameters") then
				if type(self.bgparams or nil) == "table" then
					imguiextra.drawTable(self.bgparams, {boolean = true, number = true, string = true}, {skipRender = true, skipUpdate = true, delete = true})
					local function extractValues(tbl, allowedTypes)
						local result = {}
						for k, v in pairs(tbl) do
							local t = type(v)
							if allowedTypes[t] then
								result[k] = v
							end
						end
						return result
					end
					extrasavedata.moreMMenuCustomization.bgParams = extractValues(self.bgparams, {boolean = true, number = true, string = true})
				else
					self.bgparams = helpers.copy(extrasavedata.moreMMenuCustomization.bgParams)
				end
				imgui.TextWrapped("If you crash your game after reloading. Go to savedata\\extraMod.sav")
				if imgui.Button("Clear Params") then
					self.clearBGParams = true
					extrasavedata.moreMMenuCustomization.bgParams = {}
				end
			end
			
			imguiextra.LabeledSeparator("Colors", 1)
			for i = 0, 7 do
				local color = extrasavedata.moreMMenuCustomization.palette[tostring(i)]
				color.r, color.g, color.b = helpers.imguiColor(tostring(i), color.r, color.g, color.b)
				shuv.pal[i] = helpers.copy(color)
			end
			if imgui.Button("Reset Colors") then
				shuv.resetPal()
				shuv.pal[2] = {r= 205, g=205, b=205}
				shuv.pal[3] = {r= 255, g=52, b=50}
				shuv.pal[4] = {r= 224, g=227, b=0}
				shuv.pal[5] = {r= 44, g=255, b=57}
				shuv.pal[6] = {r= 0, g=222, b=229}
				shuv.pal[7] = {r= 63, g=38, b=255}
				for i = 0, 7 do
					local color = shuv.pal[i]
					extrasavedata.moreMMenuCustomization.palette[tostring(i)] = helpers.copy(color)
				end
			end
		end
	end
	imgui.Separator()
	if imgui.Button("Reload") then
		if self.clearBGParams then
			extrasavedata.moreMMenuCustomization.bgParams = {}
		end
		cs = bs.load('Menu')
		self.menuMusicManager:clearOnBeatHooks()
		cs.menuMusicManager = self.menuMusicManager
		cs:init()
		cs.editMenu = true
	end
	
	imgui.End()
	
	if imgui.love.GetWantCaptureMouse() then
		love.mouse.setVisible(true)
	elseif savedata.options.game.customCursorInMenu and (savedata.options.game.cursorMode ~= "default") then
		love.mouse.setVisible(false)
	end
	
elseif savedata.options.game.customCursorInMenu and (savedata.options.game.cursorMode ~= "default") then
	love.mouse.setVisible(false)
end
