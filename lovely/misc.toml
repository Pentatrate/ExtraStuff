[manifest]
version = "1.1.1"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "states/Menu.lua"
pattern = '''
st:setFgDraw(function(self)
'''
position = "after"
payload = '''
--[[
	self.wow = imgui.Begin("CS Editor", nil, 0)
		imguiextra.drawTable(cs)
	imgui.End()]]
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "obj/notes/Block.lua"
pattern = '''
self.inverse = false
'''
position = "after"
payload = '''
if extrasavedata.allInverse then
	self.inverse = true
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "levelformat/events/Notes/bounce.lua"
pattern = '''
tap = event.tap,
'''
position = "at"
payload = '''
tap = event.tap or extrasavedata.allTap,
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "levelformat/events/Notes/block.lua"
pattern = '''
tap = event.tap,
'''
position = "at"
payload = '''
tap = event.tap or extrasavedata.allTap,
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "levelformat/events/Notes/inverse.lua"
pattern = '''
tap = event.tap,
'''
position = "at"
payload = '''
tap = event.tap or extrasavedata.allTap,
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "levelformat/events/Notes/side.lua"
pattern = '''
tap = event.tap,
'''
position = "at"
payload = '''
tap = event.tap or extrasavedata.allTap,
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "levelformat/events/Notes/hold.lua"
pattern = '''
tap = event.startTap,
endTap = event.endTap,
'''
position = "at"
payload = '''
tap = event.startTap or extrasavedata.allTap,
endTap = event.endTap or extrasavedata.allTap,
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "obj/TitleParticle.lua"
pattern = '''
if self.y >= 300 then self.delete = true end -- i do not trust my deleting code at all
'''
position = "at"
payload = '''
if self.y >= 370 then self.delete = true end
'''
match_indent = true
