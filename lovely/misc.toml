[manifest]
version = "1.1.1"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "states/Menu.lua"
pattern = '''
st:setFgDraw(function(self)
'''
position = "after"
payload = '''
--[[
	self.wow = imgui.Begin("CS Editor", nil, 0)
		imguiextra.drawTable(cs)
	imgui.End()]]
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "obj/notes/Block.lua"
pattern = '''
self.inverse = false
'''
position = "after"
payload = '''
if extrasavedata.allInverse then
	self.inverse = true
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "obj/notes/Block.lua"
pattern = '''
self.tap = self.tap or false
'''
position = "after"
payload = '''
if extrasavedata.allTap then
	self.tap = true
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "obj/TitleParticle.lua"
pattern = '''
if self.y >= 300 then self.delete = true end -- i do not trust my deleting code at all
'''
position = "at"
payload = '''
if self.y >= 370 then self.delete = true end
'''
match_indent = true

