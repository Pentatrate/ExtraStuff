position = "before"
payload = '''

--static helpers
function RadialList:recalcLayout()
	if not self.static then return end
    local count = #self.options[self.submenu]
    if count == 0 then return end
    self.iconDistance = (math.pi * 2) / count
    self.activeArc = math.pi + self.iconDistance * 0.5
	self.animAngle = self:slotAngle(self.selection)
	self.targetAngle = self.animAngle
end

function RadialList:slotAngle(i)
	if not self.static then return end
    return math.pi / 2 + self.iconDistance * (i - 1)
end

function RadialList:hoveredSlot()
	if not self.static then return end
    if helpers.usingController() then return nil end

    local optionCount = #self.options[self.submenu]
    if optionCount == 0 then return nil end

    local mouseDist = helpers.distance({ mouse.rx, mouse.ry }, { self.x, self.y })
    local hitInner  = self.radius - self.circleWidth / 2
    local hitOuter  = self.radius + self.circleWidth / 2
    if self.circleWidth == 0 then
        hitInner = self.radius - 24
        hitOuter = self.radius + 24
    end

    if mouseDist < hitInner or mouseDist > hitOuter then return nil end

    local mouseAngle = math.atan2(mouse.ry - self.y, mouse.rx - self.x) + math.pi
	mouseAngle = mouseAngle % (math.pi * 2)
    local bestSlot   = nil
    local bestDiff   = math.huge

    for i = 1, optionCount do
        local slotAng = self:slotAngle(i)
        local diff    = ((mouseAngle - slotAng) % (math.pi * 2))
        if diff > math.pi then diff = math.pi * 2 - diff end
        if diff < bestDiff then
            bestDiff = diff
            bestSlot = i
        end
    end
	
    return bestSlot
end

--reordering stuff
function RadialList:clampSelect()
	local count = #self.options[self.submenu]
	if count > 0 then
		self.selection = ((self.selection - 1) % count) + 1
		self.visualSelection = self.selection
	else
		self.selection = 1
		self.visualSelection = 1
	end
end

local function swap(t, a, b)
    t[a], t[b] = t[b], t[a]
end

function RadialList:swapRadialOption(list, a, b)
    swap(list.options[list.submenu], a, b)
    swap(list.icons[list.submenu], a, b)
	self:clampSelect()
end

function RadialList:reorderToIds(idList)
    -- Move items in order of idList
    for targetIndex, id in ipairs(idList) do
        for i = targetIndex, #self.options[self.submenu] do
            if self.options[self.submenu][i]._id == id then
                self:swapRadialOption(self, i, targetIndex)
                break
            end
        end
    end
	self:clampSelect()
	self:recalcLayout()
end

function RadialList:saveList(list, name, disabledname) 
    local saveData = {}
    local disabledData = {}
    local existingData = extrasavedata[name] or extraDefaultSave[name]
    local existingDisabled = extrasavedata[disabledname] or extraDefaultSave[disabledname]

    local savedIds = {}
    local savedDisabledIds = {}

    -- Save enabled options
    for i, icon in ipairs(list.options[list.submenu]) do
        local id = icon._id or "unknown_icon"
        table.insert(saveData, id)
        savedIds[id] = true
    end

    -- Include any missing old enabled IDs
    for _, oldId in ipairs(existingData) do
        if not savedIds[oldId] then
            table.insert(saveData, oldId)
        end
    end

    -- Save hidden/disabled options
    for i, icon in ipairs(list.hiddenOptions or {}) do
        local id = icon._id or "unknown_icon"
        table.insert(disabledData, id)
        savedDisabledIds[id] = true
    end

    -- save to extrasavedata
    extrasavedata[name] = saveData
    if disabledname then
        extrasavedata[disabledname] = disabledData
    end

    dpf.saveJson("savedata/extraMod.sav", extrasavedata)
end

local function find(tbl, value)
    for _, v in ipairs(tbl) do
        if v == value then return true end
    end
    return false
end

function RadialList:addHidden(idList)
    self.hiddenOptions = self.hiddenOptions or {}
    self.hiddenIcons = self.hiddenIcons or {}
    self.hiddenIndices = self.hiddenIndices or {}

    local function isAlreadyHidden(option)
        for _, hiddenOption in ipairs(self.hiddenOptions) do
            if hiddenOption == option then return true end
        end
        return false
    end

    for i = #self.options[self.submenu], 1, -1 do
        local option = self.options[self.submenu][i]
        if option._id and find(idList, option._id) and not isAlreadyHidden(option) then
            table.insert(self.hiddenOptions, option)
            table.insert(self.hiddenIcons, self.icons[self.submenu][i])
            table.insert(self.hiddenIndices, i)

            table.remove(self.options[self.submenu], i)
            table.remove(self.icons[self.submenu], i)
        end
    end
	self:clampSelect()
	self:recalcLayout()
end

function RadialList:restoreHidden(idList)
    self.hiddenOptions = self.hiddenOptions or {}
    self.hiddenIcons = self.hiddenIcons or {}
    self.hiddenIndices = self.hiddenIndices or {}

    if not idList or #idList == 0 then
        local sortedIndices = {}
        for i = 1, #self.hiddenIndices do
            table.insert(sortedIndices, i)
        end
        table.sort(sortedIndices, function(a,b) return self.hiddenIndices[a] < self.hiddenIndices[b] end)

        for _, idx in ipairs(sortedIndices) do
			local insertPos = math.min(
				self.hiddenIndices[idx],
				#self.options[self.submenu] + 1
			)
            table.insert(self.options[self.submenu], insertPos, self.hiddenOptions[idx])
            table.insert(self.icons[self.submenu], insertPos, self.hiddenIcons[idx])
        end

        self.hiddenOptions = {}
        self.hiddenIcons = {}
        self.hiddenIndices = {}
        return
    end

    for i = #self.hiddenOptions, 1, -1 do
        local option = self.hiddenOptions[i]
        if option._id and find(idList, option._id) then
            local insertPos = math.min(
				self.hiddenIndices[i],
				#self.options[self.submenu] + 1
			)
            table.insert(self.options[self.submenu], insertPos, option)
            table.insert(self.icons[self.submenu], insertPos, self.hiddenIcons[i])

            table.remove(self.hiddenOptions, i)
            table.remove(self.hiddenIcons, i)
            table.remove(self.hiddenIndices, i)
        end
    end
	self:clampSelect()
	self:recalcLayout()
end
